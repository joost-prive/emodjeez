<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Emodjeez – Data Reset</title>
<style>
  body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
  button { background: #c0392b; color: #fff; border: none; padding: 12px 24px;
           font-size: 1rem; cursor: pointer; border-radius: 6px; margin: 10px 0; display: block; }
  button:disabled { background: #555; cursor: default; }
  input { font-size: 1rem; padding: 10px; border-radius: 6px; border: none;
          background: #222; color: #fff; margin: 10px 0; width: 220px; }
  #log { white-space: pre-wrap; margin-top: 20px; font-size: 0.85rem; line-height: 1.6; }
  .ok  { color: #2ecc71; }
  .err { color: #e74c3c; }
  .inf { color: #3498db; }
  .warn { color: #f39c12; }
</style>
</head>
<body>
<h2>⚠️ Emodjeez Data Reset</h2>
<p>Dit wist <strong>alle</strong> testdata: daily results, highscores, duel-wins, daily-winners.</p>
<input type="password" id="pwInput" placeholder="Wachtwoord" />
<button id="btnUnlock">Ontgrendelen</button>
<button id="btnReset" disabled>🗑 Alle testdata wissen</button>
<div id="log"></div>

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
import { getFirestore, collection, getDocs, deleteDoc, doc }
                            from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const RESET_PASSWORD = 'emodjeez2026';

const firebaseConfig = {
    apiKey: "AIzaSyC-WOchuDhnBfUetqGIWWX9JBtCdHgNrkU",
    authDomain: "emodjeez.firebaseapp.com",
    projectId: "emodjeez",
    storageBucket: "emodjeez.firebasestorage.app",
    messagingSenderId: "560834312358",
    appId: "1:560834312358:web:f95e86cc3b5a90e84d81c5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const logEl = document.getElementById('log');

function log(msg, cls='') {
    logEl.innerHTML += `<span class="${cls}">${msg}\n</span>`;
}

document.getElementById('btnUnlock').addEventListener('click', async () => {
    const pw = document.getElementById('pwInput').value;
    if (pw !== RESET_PASSWORD) {
        log('❌ Verkeerd wachtwoord.', 'err');
        return;
    }
    try {
        await signInAnonymously(auth);
        log('✅ Ingelogd. Je kunt nu de data wissen.', 'ok');
        document.getElementById('btnReset').disabled = false;
        document.getElementById('btnUnlock').disabled = true;
        document.getElementById('pwInput').disabled = true;
    } catch (e) {
        log(`❌ Auth fout: ${e.message}`, 'err');
    }
});

// --- Helpers ---
async function deleteCollection(colPath) {
    const snap = await getDocs(collection(db, ...colPath.split('/')));
    log(`  → ${snap.size} docs gevonden in ${colPath}`, 'inf');
    for (const d of snap.docs) {
        await deleteDoc(doc(db, ...colPath.split('/'), d.id));
    }
    log(`  ✓ ${colPath} leeggemaakt`, 'ok');
}

async function deleteDailyResults() {
    log('→ emodjeez_daily_results ophalen...', 'inf');
    const datesSnap = await getDocs(collection(db, 'emodjeez_daily_results'));
    log(`  ${datesSnap.size} datum-documenten gevonden`, 'inf');
    for (const dateDoc of datesSnap.docs) {
        const dateKey = dateDoc.id;
        const entriesSnap = await getDocs(
            collection(db, 'emodjeez_daily_results', dateKey, 'entries')
        );
        log(`  ${dateKey}: ${entriesSnap.size} entries`, 'inf');
        for (const e of entriesSnap.docs) {
            await deleteDoc(doc(db, 'emodjeez_daily_results', dateKey, 'entries', e.id));
        }
        await deleteDoc(doc(db, 'emodjeez_daily_results', dateKey));
    }
    log('  ✓ emodjeez_daily_results leeg', 'ok');
}

// --- Reset ---
document.getElementById('btnReset').addEventListener('click', async () => {
    if (!confirm('Weet je het zeker? Dit is onomkeerbaar!')) return;
    document.getElementById('btnReset').disabled = true;
    log('\n🚀 Start reset...', 'warn');
    try {
        await deleteDailyResults();
        await deleteCollection('emodjeez_highscores');
        await deleteCollection('emodjeez_duel_wins');
        await deleteCollection('emodjeez_daily_winners');
        await deleteCollection('emodjeez_games');
        log('\n🎉 KLAAR! Alle testdata is gewist.', 'ok');
        log('Je kunt dit tabblad nu sluiten.', 'ok');
    } catch (e) {
        log(`\n❌ Fout: ${e.message}`, 'err');
        log('Controleer de Firestore-regels (mogelijk heb je geen delete-rechten).', 'warn');
        document.getElementById('btnReset').disabled = false;
    }
});
</script>
</body>
</html>
